# ============================================================
#  Nginx — KURA Ecommerce Site Configuration
# ============================================================

# ── HTTP → HTTPS redirect ───────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name kura.jp www.kura.jp api.kura.jp;

    # Allow ACME challenge for Let's Encrypt renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS: Main API (api.kura.jp) ──────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.kura.jp;

    # ── TLS ─────────────────────────────────────────────────
    ssl_certificate     /etc/nginx/ssl/api.kura.jp/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/api.kura.jp/privkey.pem;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # ── Security Headers ────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://api.kura.jp;" always;

    # ── Auth endpoints — tighter rate limit ─────────────────
    location /api/auth/ {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass http://shopee_api;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ── File uploads — tighter limit ────────────────────────
    location /api/media/upload {
        limit_req zone=uploads burst=5 nodelay;
        client_max_body_size 15M;
        proxy_read_timeout 120s;
        proxy_pass http://shopee_api;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ── PayPay webhook — no rate limit (idempotent) ─────────
    location /api/payments/paypay/webhook {
        proxy_pass http://shopee_api;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ── Actuator — internal access only ─────────────────────
    location /actuator/ {
        # In production, restrict to internal IPs
        # allow 10.0.0.0/8;
        # deny all;
        proxy_pass http://shopee_api;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ── Swagger (disable in production) ─────────────────────
    location ~ ^/(swagger-ui|api-docs) {
        # Uncomment to block swagger in prod:
        # return 403;
        proxy_pass http://shopee_api;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ── All other API requests ───────────────────────────────
    location /api/ {
        limit_req zone=api_global burst=50 nodelay;
        proxy_pass http://shopee_api;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ── Health check (no logging) ────────────────────────────
    location /actuator/health {
        access_log off;
        proxy_pass http://shopee_api;
        include /etc/nginx/conf.d/proxy_params.conf;
    }
}

# ── HTTPS: Frontend (kura.jp / www.kura.jp) ────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name kura.jp www.kura.jp;

    ssl_certificate     /etc/nginx/ssl/kura.jp/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/kura.jp/privkey.pem;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;

    root /var/www/kura-frontend;
    index index.html;

    # ── React SPA: serve index.html for all routes ──────────
    location / {
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # ── Static assets — long-lived cache (Vite content hashes) ─
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|webp|ico|woff2|woff|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Proxy /api calls to backend (optional: if co-located) ──
    location /api/ {
        proxy_pass http://shopee_api;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ── 404 fallback ─────────────────────────────────────────
    error_page 404 /index.html;
}
