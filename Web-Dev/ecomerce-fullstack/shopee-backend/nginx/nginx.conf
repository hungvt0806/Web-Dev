# ============================================================
#  Nginx — KURA Ecommerce Reverse Proxy
#  Handles: TLS termination, HTTP→HTTPS redirect,
#           load balancing, static file serving,
#           rate limiting, security headers, gzip
# ============================================================

user  nginx;
worker_processes  auto;                        # One worker per CPU core
worker_rlimit_nofile 65535;                   # Max open files per worker
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;                  # Max simultaneous connections per worker
    use epoll;                                 # Linux: most efficient I/O model
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ─────────────────────────────────────────────
    log_format json_access escape=json
      '{'
        '"time":"$time_iso8601",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"bytes_sent":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_time":"$upstream_response_time",'
        '"remote_addr":"$remote_addr",'
        '"x_forwarded_for":"$http_x_forwarded_for",'
        '"user_agent":"$http_user_agent",'
        '"trace_id":"$upstream_http_x_trace_id"'
      '}';

    access_log /var/log/nginx/access.log json_access buffer=32k flush=5s;

    # ── Performance ─────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    keepalive_requests 1000;

    # ── Gzip ────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        application/json
        application/javascript
        application/xml
        text/css
        text/plain
        text/html
        image/svg+xml;

    # ── Security defaults ────────────────────────────────────
    server_tokens off;                         # Hide Nginx version
    client_max_body_size 15M;                 # File upload limit
    client_body_timeout 30s;
    client_header_timeout 10s;
    send_timeout 30s;

    # ── Rate limiting zones (nginx level, before app) ───────
    # Separate from Bucket4j — Nginx-level for crude protection
    limit_req_zone $binary_remote_addr zone=api_global:10m rate=200r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m       rate=20r/m;
    limit_req_zone $binary_remote_addr zone=uploads:10m    rate=30r/m;
    limit_req_status 429;

    # ── Upstream: Spring Boot instances ─────────────────────
    upstream shopee_api {
        least_conn;                            # Route to least-busy instance
        server app:8080 max_fails=3 fail_timeout=30s;
        # For production replicas, add:
        # server app_2:8080 max_fails=3 fail_timeout=30s;
        keepalive 32;                          # Keep persistent connections to upstream
    }

    # ── Upstream: React frontend (if served from here) ──────
    upstream shopee_frontend {
        server frontend:3000;
        keepalive 16;
    }

    # Include site configs
    include /etc/nginx/conf.d/*.conf;
}
