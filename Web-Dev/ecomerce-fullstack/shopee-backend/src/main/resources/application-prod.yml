# ── Production Profile ────────────────────────────────────────
spring:
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate

server:
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never

logging:
  level:
    root: WARN
    com.shopee.ecommerce: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN

management:
  endpoint:
    health:
      show-details: never    # Don't leak infra details publicly in prod
