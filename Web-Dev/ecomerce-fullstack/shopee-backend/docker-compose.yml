# ============================================================
#  KURA Ecommerce — Development docker-compose
#  Starts all infrastructure services for local development.
#  The Spring Boot app can be run from IDE or via `app` service.
#
#  Usage:
#    docker compose up -d              # Start infra only
#    docker compose --profile app up   # Also start the Spring Boot app
# ============================================================

name: shopee

networks:
  shopee_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  elasticsearch_data:
  localstack_data:
  pgadmin_data:

services:

  # ── PostgreSQL 16 ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: shopee_postgres
    restart: unless-stopped
    networks: [shopee_net]
    environment:
      POSTGRES_DB:       shopee_db
      POSTGRES_USER:     shopee_user
      POSTGRES_PASSWORD: shopee_pass
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/main/resources/db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopee_user -d shopee_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    command: >
      postgres
        -c max_connections=200
        -c shared_buffers=256MB
        -c effective_cache_size=768MB
        -c work_mem=4MB
        -c maintenance_work_mem=64MB
        -c log_min_duration_statement=1000

  # ── Redis 7 ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: shopee_redis
    restart: unless-stopped
    networks: [shopee_net]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
        --save 60 1000
        --loglevel notice
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
        --requirepass "${REDIS_PASSWORD:-}"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Elasticsearch 8 ───────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: shopee_elasticsearch
    restart: unless-stopped
    networks: [shopee_net]
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false       # Disabled for dev; enable in prod
      - xpack.security.http.ssl.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - cluster.name=shopee-cluster
      - node.name=shopee-es-01
      - bootstrap.memory_lock=true
      - action.destructive_requires_name=true
    ports:
      - "${ES_PORT:-9200}:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile:  { soft: 65536, hard: 65536 }
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Kibana (dev UI for Elasticsearch) ─────────────────────
  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    container_name: shopee_kibana
    restart: unless-stopped
    networks: [shopee_net]
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    profiles: [tools]

  # ── LocalStack (AWS S3 emulation for dev) ─────────────────
  localstack:
    image: localstack/localstack:3.4
    container_name: shopee_localstack
    restart: unless-stopped
    networks: [shopee_net]
    ports:
      - "${LOCALSTACK_PORT:-4566}:4566"
    environment:
      - SERVICES=s3
      - DEFAULT_REGION=ap-northeast-1
      - DATA_DIR=/var/lib/localstack
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - localstack_data:/var/lib/localstack
      - ./scripts/localstack-init.sh:/etc/localstack/init/ready.d/init.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4566/_localstack/health | grep -q '\"s3\":\"available\"'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ── pgAdmin ───────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: shopee_pgadmin
    restart: unless-stopped
    networks: [shopee_net]
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@shopee.local
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    profiles: [tools]

  # ── Spring Boot App (optional — can also run from IDE) ────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: shopee_app
    restart: unless-stopped
    networks: [shopee_net]
    env_file: .env.dev
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_HOST:                postgres
      REDIS_HOST:             redis
      ELASTICSEARCH_URI:      http://elasticsearch:9200
      AWS_S3_ENDPOINT:        http://localstack:4566
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    volumes:
      - /var/log/shopee:/var/log/shopee
    profiles: [app]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health/liveness || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
